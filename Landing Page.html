<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ethos Community™ — Connecting diaspora to Sudan's recovery</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,400&family=Manrope:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300..700&family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --cream:#f7f4ee;
    --cream-2:#efeae0;
    --ink:#141512;
    --ink-soft:#3a3a36;
    --muted:#7a7568;
    --line:#e2dccf;
    --green:#0e3b2e;
    --green-2:#0a2a21;
    --gold:#c9a961;
    --gold-2:#a8884a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);font-family:var(--ff-body);-webkit-font-smoothing:antialiased}
  body[data-pair="newsreader"]{ --ff-display:"Newsreader",serif; --ff-body:"Manrope",ui-sans-serif,system-ui,sans-serif; --display-tracking:-0.02em; --display-weight:400; }
  body[data-pair="dm"]{ --ff-display:"DM Serif Display",serif; --ff-body:"DM Sans",ui-sans-serif,system-ui,sans-serif; --display-tracking:-0.01em; --display-weight:400; }
  body[data-pair="instrument"]{ --ff-display:"Instrument Serif",serif; --ff-body:"Inter Tight",ui-sans-serif,system-ui,sans-serif; --display-tracking:-0.01em; --display-weight:400; }

  a{color:inherit;text-decoration:none}
  button{font-family:inherit;border:0;background:none;cursor:pointer;color:inherit}

  /* layout */
  .container{max-width:1280px;margin:0 auto;padding:0 32px}
  @media(max-width:720px){.container{padding:0 20px}}

  /* nav */
  .nav{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);background:rgba(247,244,238,.82);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
  .logo{display:flex;align-items:center;gap:10px;font-family:var(--ff-display);font-size:22px;letter-spacing:var(--display-tracking)}
  .logo-mark{width:28px;height:28px;border-radius:50%;background:var(--green);position:relative}
  .logo-mark::after{content:"";position:absolute;inset:6px;border-radius:50%;border:1.5px solid var(--gold)}
  .nav-links{display:flex;gap:32px;font-size:14px;color:var(--ink-soft)}
  .nav-links a{position:relative;padding:6px 0}
  .nav-links a:hover{color:var(--green)}
  .nav-cta{display:flex;gap:10px;align-items:center}
  @media(max-width:880px){.nav-links{display:none}}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 22px;border-radius:999px;font-size:14px;font-weight:500;letter-spacing:.01em;transition:transform .2s ease,box-shadow .2s ease,background .2s ease;white-space:nowrap}
  .btn-primary{background:var(--green);color:var(--cream)}
  .btn-primary:hover{background:var(--green-2);transform:translateY(-1px);box-shadow:0 10px 24px -12px rgba(14,59,46,.5)}
  .btn-ghost{border:1px solid var(--ink);color:var(--ink)}
  .btn-ghost:hover{background:var(--ink);color:var(--cream)}
  .btn-text{padding:8px 0;color:var(--green);font-weight:500;font-size:14px}
  .btn-text:hover{color:var(--gold-2)}
  .btn-text .arrow{transition:transform .2s ease;display:inline-block}
  .btn-text:hover .arrow{transform:translateX(4px)}

  /* hero */
  .hero{padding:64px 0 100px;position:relative;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:64px;align-items:center}
  @media(max-width:980px){.hero-grid{grid-template-columns:1fr;gap:40px}}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-2);margin-bottom:28px}
  .eyebrow::before{content:"";width:24px;height:1px;background:var(--gold-2)}
  h1.display{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:clamp(44px,6vw,82px);line-height:1.02;letter-spacing:var(--display-tracking);margin:0 0 28px;text-wrap:balance}
  h1.display em{font-style:italic;color:var(--green)}
  .lede{font-size:19px;line-height:1.55;color:var(--ink-soft);max-width:560px;margin:0 0 36px}
  .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .hero-meta{margin-top:48px;display:flex;gap:32px;font-size:13px;color:var(--muted);font-family:"JetBrains Mono",monospace;letter-spacing:.04em}
  .hero-meta div span{display:block;color:var(--ink);font-size:22px;font-family:var(--ff-display);font-weight:var(--display-weight);letter-spacing:0;margin-bottom:4px}

  /* hero photo placeholder */
  .photo{position:relative;aspect-ratio:4/5;background:repeating-linear-gradient(135deg,#d8cfba 0,#d8cfba 2px,#cdc3ad 2px,#cdc3ad 14px);border-radius:4px;overflow:hidden;box-shadow:0 30px 80px -30px rgba(20,21,18,.4)}
  .photo .photo-meta{position:absolute;bottom:14px;left:16px;right:16px;font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.08em;color:rgba(20,21,18,.62);text-transform:uppercase;display:flex;justify-content:space-between}
  .photo-pill{position:absolute;top:18px;left:18px;background:var(--cream);padding:6px 12px;border-radius:999px;font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--green)}
  .photo-overlay{position:absolute;left:0;right:0;bottom:64px;padding:0 22px;color:var(--cream);font-family:var(--ff-display);font-size:22px;line-height:1.2;text-shadow:0 1px 30px rgba(0,0,0,.4)}
  .photo.dark{background:linear-gradient(135deg,#1a2924 0%,#3a4a3f 100%)}

  /* impact strip */
  .strip{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--cream-2)}
  .strip-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:24px;padding:36px 0}
  @media(max-width:880px){.strip-grid{grid-template-columns:repeat(2,1fr);gap:32px}}
  .stat .num{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:46px;line-height:1;letter-spacing:var(--display-tracking)}
  .stat .label{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:10px}

  /* section heads */
  .section{padding:120px 0}
  .section-head{display:grid;grid-template-columns:1fr 2fr;gap:48px;margin-bottom:64px;align-items:end}
  @media(max-width:880px){.section-head{grid-template-columns:1fr;gap:24px}}
  .section-num{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-2)}
  .section-title{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:clamp(34px,4vw,56px);line-height:1.05;letter-spacing:var(--display-tracking);margin:14px 0 0;text-wrap:balance}
  .section-lede{font-size:17px;line-height:1.6;color:var(--ink-soft);max-width:520px}

  /* verticals */
  .verticals{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
  @media(max-width:980px){.verticals{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.verticals{grid-template-columns:1fr}}
  .vcard{background:var(--cream);padding:36px 32px;display:flex;flex-direction:column;gap:18px;min-height:280px;cursor:pointer;transition:background .25s ease}
  .vcard:hover{background:var(--cream-2)}
  .vcard:hover .vcard-arrow{transform:translate(4px,-4px);opacity:1}
  .vcard-top{display:flex;align-items:flex-start;justify-content:space-between}
  .vcard-num{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.12em;color:var(--gold-2)}
  .vcard-arrow{opacity:.5;transition:transform .25s ease,opacity .25s ease;color:var(--green)}
  .vcard-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--green);margin-bottom:4px}
  .vcard h3{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:24px;letter-spacing:var(--display-tracking);margin:0;line-height:1.15}
  .vcard p{font-size:14px;line-height:1.55;color:var(--ink-soft);margin:0}
  .vcard .tags{margin-top:auto;display:flex;flex-wrap:wrap;gap:6px}
  .vcard .tag{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:999px;background:var(--cream-2);color:var(--ink-soft)}

  /* case story */
  .case{background:var(--green);color:var(--cream);border-radius:6px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:0}
  @media(max-width:880px){.case{grid-template-columns:1fr}}
  .case-photo{aspect-ratio:auto;min-height:480px;background:repeating-linear-gradient(135deg,#1a4a3a 0,#1a4a3a 2px,#143a2c 2px,#143a2c 14px);position:relative}
  .case-photo .photo-pill{background:var(--gold);color:var(--green-2)}
  .case-content{padding:64px 56px;display:flex;flex-direction:column;justify-content:center;gap:24px}
  @media(max-width:880px){.case-content{padding:40px 28px}}
  .case-eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
  .case h3{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:clamp(28px,3vw,42px);line-height:1.15;letter-spacing:var(--display-tracking);margin:0;text-wrap:balance}
  .case p{font-size:16px;line-height:1.6;color:rgba(247,244,238,.78);margin:0}
  .case-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:8px;padding-top:24px;border-top:1px solid rgba(201,169,97,.3)}
  .case-stat .num{font-family:var(--ff-display);font-size:28px;font-weight:var(--display-weight)}
  .case-stat .label{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-top:6px}
  .case-cta{margin-top:8px}
  .case-cta .btn{background:var(--gold);color:var(--green-2)}
  .case-cta .btn:hover{background:var(--cream);color:var(--green-2)}

  /* how it works */
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  @media(max-width:880px){.steps{grid-template-columns:1fr}}
  .step{background:var(--cream);padding:48px 36px;display:flex;flex-direction:column;gap:18px;min-height:300px}
  .step-num{font-family:var(--ff-display);font-size:64px;line-height:1;color:var(--gold);font-weight:var(--display-weight)}
  .step h4{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:24px;line-height:1.15;letter-spacing:var(--display-tracking);margin:0}
  .step p{font-size:14.5px;line-height:1.6;color:var(--ink-soft);margin:0}

  /* founder */
  .founder{display:grid;grid-template-columns:1fr 1.6fr;gap:64px;align-items:center}
  @media(max-width:880px){.founder{grid-template-columns:1fr;gap:32px}}
  .founder-photo{aspect-ratio:4/5;background:repeating-linear-gradient(135deg,#d8cfba 0,#d8cfba 2px,#cdc3ad 2px,#cdc3ad 14px);border-radius:4px;position:relative}
  .founder blockquote{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:clamp(24px,2.4vw,34px);line-height:1.3;letter-spacing:var(--display-tracking);margin:0 0 28px;color:var(--ink);text-wrap:balance}
  .founder blockquote::before{content:"\201C";color:var(--gold);font-size:1.4em;line-height:0;vertical-align:-0.2em;margin-right:.1em}
  .founder-name{font-family:var(--ff-display);font-size:20px;margin-bottom:4px}
  .founder-title{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;line-height:1.6}
  .credentials{display:flex;flex-wrap:wrap;gap:8px}
  .cred{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;padding:6px 12px;border:1px solid var(--line);border-radius:999px;color:var(--ink-soft)}

  /* CTA band */
  .cta-band{background:var(--ink);color:var(--cream);padding:96px 0;text-align:center}
  .cta-band h2{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:clamp(36px,4.5vw,64px);line-height:1.05;letter-spacing:var(--display-tracking);margin:0 auto 24px;max-width:14ch;text-wrap:balance}
  .cta-band p{font-size:17px;line-height:1.6;color:rgba(247,244,238,.7);max-width:520px;margin:0 auto 36px}
  .cta-band .btn-primary{background:var(--gold);color:var(--ink)}
  .cta-band .btn-primary:hover{background:var(--cream)}
  .cta-band .btn-ghost{border-color:var(--cream);color:var(--cream)}
  .cta-band .btn-ghost:hover{background:var(--cream);color:var(--ink)}

  /* footer */
  footer{background:var(--green-2);color:rgba(247,244,238,.7);padding:64px 0 32px;font-size:14px}
  .footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;padding-bottom:48px;border-bottom:1px solid rgba(247,244,238,.12)}
  @media(max-width:880px){.footer-top{grid-template-columns:1fr 1fr;gap:32px}}
  .footer-col h5{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 16px;font-weight:500}
  .footer-col ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px}
  .footer-col a:hover{color:var(--cream)}
  .footer-brand .logo{color:var(--cream);margin-bottom:16px}
  .footer-brand p{max-width:360px;line-height:1.6;color:rgba(247,244,238,.6)}
  .compliance{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.04em;line-height:1.7;color:rgba(247,244,238,.5);margin-top:32px;max-width:780px}
  .footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:24px;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:rgba(247,244,238,.4)}
  @media(max-width:600px){.footer-bottom{flex-direction:column;gap:12px;text-align:center}}

  /* fade in on scroll */
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .8s ease,transform .8s ease}
  .reveal.in{opacity:1;transform:translateY(0)}

  /* counter */
  .counting{font-variant-numeric:tabular-nums}

  /* prototype watermark */
  .demo-tag{position:fixed;bottom:18px;left:18px;background:rgba(20,21,18,.85);color:var(--gold);font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;border-radius:999px;z-index:30;backdrop-filter:blur(8px)}

  /* toast */
  .toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);padding:14px 22px;border-radius:999px;font-size:14px;box-shadow:0 20px 50px -20px rgba(0,0,0,.5);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body data-pair="newsreader">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
