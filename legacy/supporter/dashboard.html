<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Supporter Dashboard — Ethos Community™</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,400&family=Manrope:wght@300;400;500;600;700&family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,300..700&family=Instrument+Serif&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../styles.css" />
<style>
  /* dashboard-specific */
  .dash-hero{background:var(--cream-2);border-bottom:1px solid var(--line);padding:48px 0 56px}
  .dash-hero-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:end}
  @media(max-width:880px){.dash-hero-grid{grid-template-columns:1fr;gap:32px}}
  .dash-greet{font-family:var(--ff-display);font-weight:var(--display-weight);font-size:clamp(36px,4vw,52px);line-height:1.05;letter-spacing:var(--display-tracking);margin:14px 0 0;text-wrap:balance}
  .dash-greet em{font-style:italic;color:var(--green)}
  .persona-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}
  .persona-pill{display:inline-flex;align-items:center;gap:8px;background:var(--cream);border:1px solid var(--line);padding:6px 12px 6px 6px;border-radius:999px;font-size:13px;cursor:pointer;transition:all .2s ease}
  .persona-pill .ava{width:24px;height:24px;border-radius:50%;background:var(--green);color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--ff-display)}
  .persona-pill.active{border-color:var(--green);background:var(--cream)}
  .persona-pill:hover{border-color:var(--green)}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:36px}
  @media(max-width:880px){.summary-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.summary-grid{grid-template-columns:1fr;gap:12px}.sum-card{padding:18px}.dash-hero-grid > div:last-child{text-align:left!important}.dash-hero-grid > div:last-child > div:last-child{justify-content:flex-start!important;flex-wrap:wrap}.persona-strip{gap:10px}.persona-pill{min-height:44px}}
  .sum-card{background:var(--cream);border:1px solid var(--line);border-radius:6px;padding:20px}
  .sum-card .label{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .sum-card .num{font-family:var(--ff-display);font-size:36px;line-height:1;font-weight:var(--display-weight);letter-spacing:var(--display-tracking)}
  .sum-card .delta{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--green);margin-top:8px;letter-spacing:.04em}
  .sum-card .delta.down{color:var(--red)}

  .dash-body{padding:64px 0 96px;display:grid;grid-template-columns:1fr 320px;gap:48px}
  @media(max-width:1080px){.dash-body{grid-template-columns:1fr}}

  .case-row{display:grid;grid-template-columns:80px 1fr 220px 200px 120px;gap:20px;align-items:center;padding:20px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s ease}
  .case-row:hover{background:rgba(239,234,224,.4)}
  .case-row .ava-wrap{width:64px;height:64px;border-radius:6px;overflow:hidden;background:repeating-linear-gradient(135deg,#d8cfba 0,#d8cfba 2px,#cdc3ad 2px,#cdc3ad 8px)}
  .case-row h4{font-family:var(--ff-display);font-size:20px;margin:0 0 4px;line-height:1.2}
  .case-row .case-meta{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.06em;display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
  .case-row .vert{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--gold-2);letter-spacing:.1em;text-transform:uppercase}
  .case-row .progress-cell{display:flex;flex-direction:column;gap:6px}
  .case-row .progress-cell .pct{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-soft);display:flex;justify-content:space-between}
  @media(max-width:880px){
    .case-row{grid-template-columns:64px 1fr;gap:14px}
    .case-row > :nth-child(n+3){grid-column:1 / -1}
  }

  .filter-bar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center;padding-bottom:24px;border-bottom:1px solid var(--line)}
  .chip{padding:8px 14px;border:1px solid var(--line);border-radius:999px;background:var(--cream);font-size:12.5px;color:var(--ink-soft);cursor:pointer;transition:all .15s ease;font-family:"JetBrains Mono",monospace;letter-spacing:.04em}
  .chip:hover{border-color:var(--green)}
  .chip.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .filter-bar .spacer{flex:1}

  .panel{background:var(--cream);border:1px solid var(--line);border-radius:6px;padding:24px}
  .panel + .panel{margin-top:20px}
  .panel h4{font-family:var(--ff-display);font-size:20px;margin:0 0 4px;line-height:1.2}
  .panel-eyebrow{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-2);margin-bottom:12px}
  .activity-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px dashed var(--line);font-size:13.5px;line-height:1.5}
  .activity-item:last-child{border-bottom:0}
  .activity-item .when{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted);letter-spacing:.06em;min-width:54px;flex-shrink:0;padding-top:2px}
  .activity-item strong{font-weight:600;color:var(--ink)}
</style>
</head>
<body data-pair="newsreader">
<template id="__bundler_thumbnail" data-bg-color="#0e3b2e">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0e3b2e"/>
    <g fill="#c9a961" transform="translate(600 400)">
      <circle r="180" fill="none" stroke="#c9a961" stroke-width="8"/>
      <text x="0" y="22" font-family="Georgia, serif" font-size="160" font-style="italic" text-anchor="middle">E</text>
    </g>
    <text x="600" y="660" font-family="Georgia, serif" font-size="36" fill="#f7f4ee" text-anchor="middle">Ethos Community™</text>
    <text x="600" y="700" font-family="monospace" font-size="16" fill="#c9a961" text-anchor="middle" letter-spacing="6">SUPPORTER · DASHBOARD</text>
  </svg>
</template>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../shared.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
</body>
</html>
